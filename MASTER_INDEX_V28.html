<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLT — Surgical HD Carousel V28.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg: #000;
            --pink: #fa02ea;
            --cyan: #00e3fd;
            --emerald: #b0ff00;
            --accent: var(--cyan);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #carousel-container {
            position: relative;
            width: 100vw;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .runner-wrap {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .runner-wrap.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .runner-img {
            max-height: 80%;
            max-width: 80%;
            filter: drop-shadow(0 0 40px var(--accent));
            transition: filter 0.5s;
        }

        #canvas-ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5em;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            transition: color 0.5s;
        }

        .nav {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 60px;
            z-index: 1000;
            pointer-events: auto;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            opacity: 0.2;
            transition: 0.3s;
            font-size: 11px;
            letter-spacing: 0.5em;
            color: #fff;
            cursor: none;
            pointer-events: auto;
            padding: 20px;
        }

        .btn:hover, .btn.active {
            opacity: 1;
            transform: translateY(-5px);
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #fff;
            transition: 0.3s;
        }

        .btn.active .dot {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: scale(2);
        }

        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        #bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
            transition: background 1s;
        }

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 8px;
            color: #444;
            z-index: 1000;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="debug">V28.2 DEBUG: UI_READY</div>
    <div id="cursor"></div>
    <div id="bg-glow"></div>

    <div id="canvas-ui">
        <div class="header" style="display:flex; justify-content:space-between;">
            <div class="brand">BOLT</div>
            <div style="font-size: 10px; opacity:0.4; letter-spacing:0.2em;">SYSTEM V28.2 // REDUNDANT HD CAROUSEL</div>
        </div>
        <div style="font-size: 8px; opacity: 0.2; letter-spacing: 0.3em; display: flex; justify-content: space-between;">
            <div>LCID: BOLT-CAROUSEL-ALPHA</div><div>STATUS: READY_FOR_NAVIGATION</div>
        </div>
    </div>

    <div id="carousel-container">
        <div id="wrap-cyan" class="runner-wrap active">
            <img src="cyan_hd_v12.png" class="runner-img">
        </div>
        <div id="wrap-pink" class="runner-wrap">
            <img src="pink_hd_v12.png" class="runner-img">
        </div>
        <div id="wrap-emerald" class="runner-wrap">
            <img src="emerald_hd_v12.png" class="runner-img">
        </div>
    </div>

    <nav class="nav">
        <div class="btn active" onmouseenter="switchRunner('cyan', this)" onclick="switchRunner('cyan', this)">
            <div class="dot"></div><span>LISTEN</span>
        </div>
        <div class="btn" onmouseenter="switchRunner('pink', this)" onclick="switchRunner('pink', this)">
            <div class="dot"></div><span>SPEAK</span>
        </div>
        <div class="btn" onmouseenter="switchRunner('emerald', this)" onclick="switchRunner('emerald', this)">
            <div class="dot"></div><span>MOVE</span>
        </div>
    </nav>

    <script>
        const COLORS = {
            cyan: '#00e3fd',
            pink: '#fa02ea',
            emerald: '#b0ff00'
        };
        let currentActive = 'cyan';

        function switchRunner(key, el) {
            if (currentActive === key) return;
            currentActive = key;
            
            console.log(`Switching to: ${key}`);
            document.getElementById('debug').textContent = `V28.2 DEBUG: ACTIVE_STATE=${key.toUpperCase()}`;

            // Update Buttons
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            // Update Colors
            const color = COLORS[key];
            document.documentElement.style.setProperty('--accent', color);
            
            // GSAP Transition
            gsap.to('.runner-wrap', { opacity: 0, scale: 0.95, duration: 0.5, ease: "power2.inOut" });
            gsap.to(`#wrap-${key}`, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.2)" });

            // Background Glow
            gsap.to('#bg-glow', {
                opacity: 0.05,
                duration: 0.5,
                onComplete: () => {
                    document.getElementById('bg-glow').style.background = `radial-gradient(circle at center, ${color} 0%, transparent 70%)`;
                }
            });
        }

        document.addEventListener('mousemove', (e) => {
            gsap.to('#cursor', { x: e.clientX, y: e.clientY, duration: 0.05 });
            
            // Parallax
            const xPos = (e.clientX / window.innerWidth - 0.5);
            const yPos = (e.clientY / window.innerHeight - 0.5);
            
            gsap.to('.runner-img', {
                x: xPos * 40,
                y: yPos * 20,
                rotationY: xPos * 10,
                rotationX: -yPos * 10,
                duration: 2,
                ease: 'power3.out'
            });
        });

        // Auto-fix if something fails to load
        window.addEventListener('error', (e) => {
            document.getElementById('debug').textContent = `ERROR: ${e.message}`;
        }, true);
    </script>
</body>
</html>
