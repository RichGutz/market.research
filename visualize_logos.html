    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 40px; }

            background: #252525; 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;

        h2 { margin-top: 0; font-size: 1.2rem; color: #aaa; }

            background: #000; 
            border: 1px solid #333; 
            border-radius: 8px; 
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 400px;
            height: 400px;
        }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .meta { font-family: monospace; font-size: 11px; color: #666; word-break: break-all; max-width: 400px; text-align: left; }
    </style>
