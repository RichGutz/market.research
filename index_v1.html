<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Premium Electronics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #09090b;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, .022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .022) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }

    #glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background .9s ease;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      gap: clamp(8px, 1.8vh, 20px);
    }

    .product-meta {
      text-align: center;
      min-height: 68px;
    }

    .product-label {
      font-size: clamp(.6rem, 1.4vw, .8rem);
      font-weight: 400;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      margin-bottom: 4px;
    }

    .product-name {
      font-size: clamp(1.4rem, 3.8vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(130deg, #fff 30%, var(--accent, #4fc3f7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Wrapper: position:relative es clave para el overlay de logos */
    .svg-wrapper {
      position: relative;
      perspective: 900px;
      cursor: pointer;
      transition: width .5s ease, height .5s ease;
    }

    #product-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      will-change: transform;
      display: block;
    }

    #product-svg polygon {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* Overlay de logos: se superpone sobre el SVG */
    #logo-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      /* los logos hijos usarán position:absolute dentro de este div */
    }

    .price-tag {
      font-size: clamp(.9rem, 2vw, 1.25rem);
      font-weight: 300;
      color: rgba(255, 255, 255, .45);
    }

    .price-tag span {
      color: var(--accent, #4fc3f7);
      font-weight: 700;
    }

    .nav-dots {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .2);
      cursor: pointer;
      transition: background .3s, box-shadow .3s, transform .3s;
    }

    .dot.active {
      background: var(--accent, #4fc3f7);
      box-shadow: 0 0 12px var(--accent, #4fc3f7);
      transform: scale(1.3);
    }

    .hint {
      font-size: .66rem;
      letter-spacing: .22em;
      color: rgba(255, 255, 255, .15);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hint::before,
    .hint::after {
      content: '';
      width: 22px;
      height: 1px;
      background: rgba(255, 255, 255, .12);
    }

    .arrow-hint {
      position: fixed;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .22;
    }

    .arrow-hint button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .3);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div id="glow-bg"></div>
  <div class="hero">
    <div class="product-meta">
      <p class="product-label" id="prod-label">Smartphone Premium</p>
      <h1 class="product-name" id="prod-name">iPhone 16 Pro</h1>
    </div>
    <div class="svg-wrapper" id="svg-wrapper" title="Haz clic para explorar">
      <svg id="product-svg" viewBox="0 0 400 540" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="logo-overlay"></div>
    </div>
    <p class="price-tag" id="prod-price">Desde <span>$999</span></p>
    <div class="nav-dots">
      <div class="dot active" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
    </div>
    <p class="hint">Haz clic para explorar</p>
  </div>
  <div class="arrow-hint">
    <button id="btn-prev">▲</button>
    <button id="btn-next">▼</button>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════
       Logo Apple SVG path — viewBox 0 0 100 120
       Aproximación del contorno del logo de la manzana mordida
       ═══════════════════════════════════════════════════════ */
    const APPLE_D = `
  M 50,26
  C 44,26 40,30 35,30
  C 29,30 23,25 15,25
  C  7,25  1,32  1,42
  C  1,62 14,80 25,90
  C 30,95 35,98 41,98
  C 46,98 49,95 54,95
  C 59,95 62,98 67,98
  C 73,98 78,95 83,90
  C 94,80 99,62 99,42
  C 99,32 93,25 85,25
  C 77,25 71,30 65,30
  C 59,30 56,26 50,26 Z
  M 55,12
  C 55, 7 60, 2 66, 2
  C 66, 2 67, 9 61,14
  C 58,16 55,16 55,12 Z
`;

    /* ═══════════════════════════════════════════════════════
       LOGOS: HTML que se inyecta en #logo-overlay por producto
       Posición absoluta dentro del overlay (porcentajes).
       ═══════════════════════════════════════════════════════ */
    const LOGO_HTML = [

      // 0 — iPhone: Apple logo centrado sobre la pantalla (~38% top)
      `<div style="position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);">
    <svg viewBox="0 0 100 120" width="28" height="34">
      <path fill="rgba(255,255,255,0.22)" d="${APPLE_D}"/>
    </svg>
  </div>`,

      // 1 — MacBook: Apple logo centrado en la pantalla (~40% top)
      `<div style="position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);">
    <svg viewBox="0 0 100 120" width="30" height="36">
      <path fill="rgba(210,210,210,0.28)" d="${APPLE_D}"/>
    </svg>
  </div>`,

      // 2 — PS5: botones del mando en la columna central (~52% top)
      `<div style="
      position:absolute;top:52%;left:50%;
      transform:translate(-50%,-50%);
      text-align:center;font-family:system-ui,sans-serif;
      line-height:1.5; user-select:none;">
    <div style="color:#5b8ecf;font-size:15px;margin-bottom:2px;">△</div>
    <div style="display:flex;gap:14px;justify-content:center;margin-bottom:2px;">
      <span style="color:#c8384a;font-size:15px;">□</span>
      <span style="color:#c8384a;font-size:15px;">○</span>
    </div>
    <div style="color:#5b8ecf;font-size:15px;margin-bottom:5px;">×</div>
    <div style="color:rgba(255,255,255,0.32);font-size:7px;letter-spacing:3px;">PLAYSTATION</div>
  </div>`
    ];

    /* ═══════════════════════════════════════════════════════
       PRODUCTOS — 12 polígonos exactos por producto
       ═══════════════════════════════════════════════════════ */
    const PRODUCTS = [

      // ── 0: iPHONE 16 PRO (portrait 400×540) ───────────────
      {
        name: 'iPhone 16 Pro', label: 'Smartphone Premium', price: '$999',
        accent: '#4fc3f7', glow: 'rgba(79,195,247,0.08)', shadow: 'rgba(79,195,247,0.22)',
        vb: '0 0 400 540', ww: 200, wh: 410,
        shards: [
          ['108,18 292,18 290,72 110,72', '#1c1c26', 1],   // 0 top (zona cámara)
          ['108,72 122,72 120,432 106,432', '#141420', 1],   // 1 bezel izq
          ['278,72 292,72 294,432 280,432', '#181824', 1],   // 2 bezel der
          ['106,432 294,432 290,500 110,500', '#1c1c26', 1],   // 3 bottom
          ['122,72 200,72 198,252 120,255', '#09253f', 1],   // 4 screen UL
          ['200,72 278,72 280,255 202,252', '#0c2e4e', 1],   // 5 screen UR
          ['120,255 198,252 196,432 118,432', '#0e3660', 1],   // 6 screen LL
          ['202,252 280,255 282,432 200,432', '#113e70', 1],   // 7 screen LR
          ['163,28 237,28 234,54 166,54', '#000000', 1],   // 8 Dynamic Island
          ['220,22 285,22 288,66 217,66', '#252536', 1],   // 9 módulo cámara
          ['174,488 226,488 223,500 177,500', '#4fc3f7', .8],  // 10 USB-C
          ['122,72 200,72 122,180', '#ffffff', .05], // 11 screen glow
        ]
      },

      // ── 1: MacBOOK PRO (landscape 500×380) ────────────────
      {
        name: 'MacBook Pro', label: 'Portátil Profesional', price: '$1,299',
        accent: '#a0a0aa', glow: 'rgba(160,160,170,0.07)', shadow: 'rgba(160,160,170,0.20)',
        vb: '0 0 500 380', ww: 400, wh: 305,
        shards: [
          ['10,10 250,10 250,275 10,275', '#36363c', 1],   // 0 lid izq
          ['250,10 490,10 490,275 250,275', '#3c3c42', 1],   // 1 lid der
          ['22,22 250,22 250,148 22,148', '#080808', 1],   // 2 screen UL
          ['250,22 478,22 478,148 250,148', '#0a0a0a', 1],   // 3 screen UR
          ['22,148 250,148 250,262 22,262', '#060606', 1],   // 4 screen LL
          ['250,148 478,148 478,262 250,262', '#080808', 1],   // 5 screen LR
          ['10,275 490,275 490,292 10,292', '#1c1c22', 1],   // 6 hinge
          ['0,292 250,292 250,360 0,360', '#4e4e56', 1],   // 7 base izq
          ['250,292 500,292 500,360 250,360', '#525260', 1],   // 8 base der
          ['14,298 486,298 486,322 14,322', '#5e5e6a', 1],   // 9 highlight teclas
          ['185,332 315,332 315,354 185,354', '#3c3c44', 1],   // 10 trackpad
          ['0,358 500,358 496,370 4,370', '#1a1a1e', 1],   // 11 front edge
        ]
      },

      // ── 2: PLAYSTATION 5 (portrait 400×540) ───────────────
      {
        name: 'PlayStation 5', label: 'Consola Next-Gen', price: '$499',
        accent: '#3b82f6', glow: 'rgba(59,130,246,0.12)', shadow: 'rgba(59,130,246,0.28)',
        vb: '0 0 400 540', ww: 230, wh: 420,
        shards: [
          ['130,12 270,12 290,42 110,42', '#d4d4d4', 1],   // 0 top fin blanco
          ['175,14 22,48 16,270 172,256', '#f0f0f0', 1],   // 1 placa izq sup
          ['14,272 170,258 164,464 10,492', '#e6e6e6', 1],   // 2 placa izq inf
          ['225,14 378,48 384,270 228,256', '#ececec', 1],   // 3 placa der sup
          ['230,258 386,272 390,492 236,464', '#e4e4e4', 1],   // 4 placa der inf
          ['178,10 222,10 225,80 175,80', '#0c0c0c', 1],   // 5 top fin negro
          ['172,80 228,80 232,256 168,256', '#111111', 1],   // 6 columna sup
          ['166,258 234,258 238,464 162,464', '#0e0e0e', 1],   // 7 columna inf
          ['14,272 50,256 44,350 10,368', '#1d4ed8', .95], // 8 LED izq
          ['350,256 386,272 390,368 356,350', '#1d4ed8', .95], // 9 LED der
          ['158,464 200,462 197,528 155,528', '#181818', 1],   // 10 stand izq
          ['200,462 242,464 245,528 203,528', '#1a1a1a', 1],   // 11 stand der
        ]
      }
    ];

    /* ═══════════════════════════════════════════════════════
       MOTOR
       ═══════════════════════════════════════════════════════ */
    let current = 0, locked = false, floatAnim = null;
    const NS = 12, polys = [];
    const overlay = () => document.getElementById('logo-overlay');

    function init() {
      const svg = document.getElementById('product-svg');
      for (let i = 0; i < NS; i++) {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        p.id = 'sh' + i; svg.appendChild(p); polys.push(p);
      }
      applyShards(0); setWrapper(0, false); scatter(); buildIn(true);

      document.getElementById('svg-wrapper').addEventListener('click', () => nav(1));
      document.getElementById('btn-next').addEventListener('click', () => nav(1));
      document.getElementById('btn-prev').addEventListener('click', () => nav(-1));
      document.querySelectorAll('.dot').forEach(d => {
        d.addEventListener('click', () => { const i = +d.dataset.i; if (i !== current && !locked) goTo(i); });
      });
      document.addEventListener('mousemove', onMouse);
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
      });
      setInterval(() => { if (current === 2 && !locked) gsap.to([polys[8], polys[9]], { opacity: .3, duration: .6, ease: 'sine.inOut', yoyo: true, repeat: 1 }); }, 2400);
    }

    function setWrapper(pi, animate = false) {
      const p = PRODUCTS[pi];
      const vh = window.innerHeight, vw = window.innerWidth;
      const maxH = Math.min(p.wh, vh * .60), maxW = Math.min(p.ww, vw * .82);
      const ratio = p.ww / p.wh;
      let fw = maxW, fh = fw / ratio;
      if (fh > maxH) { fh = maxH; fw = fh * ratio; }
      const el = document.getElementById('svg-wrapper');
      document.getElementById('product-svg').setAttribute('viewBox', p.vb);
      animate ? gsap.to(el, { width: fw, height: fh, duration: .45, ease: 'power2.inOut' })
        : gsap.set(el, { width: fw, height: fh });
    }

    function applyShards(pi) {
      PRODUCTS[pi].shards.forEach((s, i) => {
        polys[i].setAttribute('points', s[0]);
        polys[i].setAttribute('fill', s[1]);
        gsap.set(polys[i], { opacity: s[2] });
      });
    }

    function scatter() {
      polys.forEach((p, i) => {
        const ang = (i / NS) * Math.PI * 2 + Math.random() * .8;
        const d = 350 + Math.random() * 180;
        gsap.set(p, { x: Math.cos(ang) * d, y: Math.sin(ang) * d, rotation: Math.random() * 360 - 180, scale: 0, opacity: 0 });
      });
    }

    function buildIn(first = false) {
      const prod = PRODUCTS[current];
      const tl = gsap.timeline({
        onComplete: () => {
          locked = false; startFloat();
          // Fade in del logo al terminar el ensamblaje
          overlay().innerHTML = LOGO_HTML[current];
          gsap.fromTo(overlay(), { opacity: 0 }, { opacity: 1, duration: .8, ease: 'power2.out' });
        }
      });
      polys.forEach((p, i) => {
        tl.to(p, {
          x: 0, y: 0, scale: 1, rotation: 0, opacity: prod.shards[i][2],
          duration: first ? 1.4 : 1.1, ease: 'expo.out'
        }, i * .055);
      });
      return tl;
    }

    function scatterOut() {
      stopFloat();
      // Primero hace desaparecer el logo
      gsap.to(overlay(), { opacity: 0, duration: .2 });
      const tl = gsap.timeline();
      polys.forEach((p, i) => {
        const ang = Math.random() * Math.PI * 2, d = 260 + Math.random() * 130;
        tl.to(p, {
          x: Math.cos(ang) * d, y: Math.sin(ang) * d,
          rotation: Math.random() * 500 - 250, scale: .06, opacity: 0,
          duration: .48, ease: 'power3.in'
        }, i * .022);
      });
      return tl;
    }

    function nav(dir) { if (!locked) goTo(((current + dir) % 3 + 3) % 3); }

    function goTo(ni) {
      if (locked || ni === current) return;
      locked = true;
      const tl = gsap.timeline();
      tl.add(scatterOut());
      tl.call(() => { current = ni; applyShards(ni); scatter(); setWrapper(ni, true); updateUI(ni); });
      tl.add(buildIn());
    }

    function updateUI(pi) {
      const p = PRODUCTS[pi];
      const els = ['#prod-name', '#prod-label', '#prod-price'];
      gsap.to(els, {
        opacity: 0, y: -10, duration: .22, onComplete: () => {
          document.getElementById('prod-name').textContent = p.name;
          document.getElementById('prod-label').textContent = p.label;
          document.getElementById('prod-price').innerHTML = `Desde <span>${p.price}</span>`;
          gsap.to(els, { opacity: 1, y: 0, duration: .34 });
        }
      });
      document.documentElement.style.setProperty('--accent', p.accent);
      document.getElementById('glow-bg').style.background =
        `radial-gradient(ellipse 70% 60% at 50% 52%,${p.glow} 0%,transparent 70%)`;
      document.getElementById('product-svg').style.filter =
        `drop-shadow(0 20px 55px ${p.shadow})`;
      document.querySelectorAll('.dot').forEach((d, i) => {
        const a = i === pi;
        d.classList.toggle('active', a);
        d.style.background = a ? p.accent : 'rgba(255,255,255,.2)';
        d.style.boxShadow = a ? `0 0 14px ${p.accent}` : 'none';
      });
    }

    function startFloat() { floatAnim = gsap.to('#product-svg', { y: -11, duration: 2.8, ease: 'sine.inOut', yoyo: true, repeat: -1 }); }
    function stopFloat() { if (floatAnim) { floatAnim.kill(); floatAnim = null; } gsap.to('#product-svg', { y: 0, duration: .3 }); }
    function onMouse(e) {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      gsap.to('#svg-wrapper', { rotateX: ((e.clientY - cy) / cy) * -9, rotateY: ((e.clientX - cx) / cx) * 13, duration: .85, ease: 'power2.out' });
    }

    init();
  </script>
</body>

</html>
