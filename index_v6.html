<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Premium Electronics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #09090b;
    }

    body {
      background: var(--bg-color);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 1.5s ease-in-out;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, .022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .022) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }

    #glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background .9s ease;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      gap: clamp(8px, 1.8vh, 20px);
    }

    .product-meta {
      text-align: center;
      min-height: 68px;
    }

    .product-label {
      font-size: clamp(.6rem, 1.4vw, .8rem);
      font-weight: 400;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      margin-bottom: 4px;
    }

    .product-name {
      font-size: clamp(1.4rem, 3.8vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(130deg, #fff 30%, var(--accent, #4fc3f7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Wrapper: position:relative es clave para el overlay de logos */
    .svg-wrapper {
      position: relative;
      perspective: 900px;
      cursor: pointer;
      transition: width .5s ease, height .5s ease;
    }

    #product-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      will-change: transform;
      display: block;
    }

    #product-svg polygon {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* Overlay de logos: se superpone sobre el SVG */
    #logo-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      /* los logos hijos usarán position:absolute dentro de este div */
    }

    .price-tag {
      font-size: clamp(.9rem, 2vw, 1.25rem);
      font-weight: 300;
      color: rgba(255, 255, 255, .45);
    }

    .price-tag span {
      color: var(--accent, #4fc3f7);
      font-weight: 700;
    }

    .nav-dots {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .2);
      cursor: pointer;
      transition: background .3s, box-shadow .3s, transform .3s;
    }

    .dot.active {
      background: var(--accent, #4fc3f7);
      box-shadow: 0 0 12px var(--accent, #4fc3f7);
      transform: scale(1.3);
    }

    .hint {
      font-size: .66rem;
      letter-spacing: .22em;
      color: rgba(255, 255, 255, .15);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hint::before,
    .hint::after {
      content: '';
      width: 22px;
      height: 1px;
      background: rgba(255, 255, 255, .12);
    }

    .arrow-hint {
      position: fixed;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .22;
    }

    .arrow-hint button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .3);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── GLASSMORPHISM & LIGHTING ─── */
    #glass-overlay {
      position: absolute;
      inset: -50px;
      pointer-events: none;
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      mix-blend-mode: soft-light;
      border-radius: 40px;
      opacity: 0;
      transition: opacity 1s;
      z-index: 5;
    }

    #light-point {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle closest-side, rgba(255, 255, 255, 0.15), transparent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      mix-blend-mode: overlay;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.5s;
    }


    #particles-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      mix-blend-mode: screen;
    }
  </style>
</head>

    /* ═══════════════════════════════════════════════════════
       MOTOR
       ═══════════════════════════════════════════════════════ */
    let current = 0, locked = false, floatAnim = null;
    const NS = 30, polys = [];
    const overlay = () => document.getElementById('logo-overlay');


    function spawnParticles(color) {
      const container = document.getElementById('particles-container');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = color;
        p.style.boxShadow = `0 0 10px ${color}`;

        // Random shapes
        if (Math.random() > 0.5) p.style.borderRadius = '0%';
        container.appendChild(p);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 80 + Math.random() * 300;

        gsap.to(p, {
          x: Math.cos(angle) * velocity,
          y: Math.sin(angle) * velocity,
          rotation: Math.random() * 360,
          scale: Math.random() * 3,
          opacity: 0.8,
          duration: 0.2 + Math.random() * 0.4,
          ease: 'power3.out',
          onComplete: () => {
            gsap.to(p, {
              opacity: 0,
              scale: 0,
              y: "+=50",
              duration: 0.6 + Math.random() * 1.2,
              ease: 'power2.in',
              onComplete: () => p.remove()
            });
          }
        });
      }
    }

    function init() {

      const svg = document.getElementById('product-svg');
      for (let i = 0; i < NS; i++) {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        p.id = 'sh' + i; svg.appendChild(p); polys.push(p);
      }
      applyShards(0); setWrapper(0, false); scatter(); buildIn(true);

      document.getElementById('svg-wrapper').addEventListener('click', () => nav(1));
      document.getElementById('btn-next').addEventListener('click', () => nav(1));
      document.getElementById('btn-prev').addEventListener('click', () => nav(-1));
      document.querySelectorAll('.dot').forEach(d => {
        d.addEventListener('click', () => { const i = +d.dataset.i; if (i !== current && !locked) goTo(i); });
      });
      document.addEventListener('mousemove', onMouse);
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
      });
      setInterval(() => { if (current === 2 && !locked) gsap.to([polys[8], polys[9]], { opacity: .3, duration: .6, ease: 'sine.inOut', yoyo: true, repeat: 1 }); }, 2400);
    }

    function setWrapper(pi, animate = false) {
      const p = PRODUCTS[pi];
      const vh = window.innerHeight, vw = window.innerWidth;
      const maxH = Math.min(p.wh, vh * .60), maxW = Math.min(p.ww, vw * .82);
      const ratio = p.ww / p.wh;
      let fw = maxW, fh = fw / ratio;
      if (fh > maxH) { fh = maxH; fw = fh * ratio; }
      const el = document.getElementById('svg-wrapper');
      document.getElementById('product-svg').setAttribute('viewBox', p.vb);
      animate ? gsap.to(el, { width: fw, height: fh, duration: .45, ease: 'power2.inOut' })
        : gsap.set(el, { width: fw, height: fh });
    }

    function applyShards(pi) {
      PRODUCTS[pi].shards.forEach((s, i) => {
        polys[i].setAttribute('points', s[0]);
        polys[i].setAttribute('fill', s[1]);
        gsap.set(polys[i], { opacity: s[2] });
      });
    }

    function scatter() {
      polys.forEach((p, i) => {
        const ang = (i / NS) * Math.PI * 2 + Math.random() * .8;
        const d = 350 + Math.random() * 180;
        gsap.set(p, { x: Math.cos(ang) * d, y: Math.sin(ang) * d, rotation: Math.random() * 360 - 180, scale: 0, opacity: 0 });
      });
    }

    function buildIn(first = false) {
      const prod = PRODUCTS[current];
      const tl = gsap.timeline({
        onComplete: () => {
          locked = false; startFloat();
          // Fade in del logo al terminar el ensamblaje
          overlay().innerHTML = LOGO_HTML[current];
          gsap.fromTo(overlay(), { opacity: 0 }, { opacity: 1, duration: .8, ease: 'power2.out' });
        }
      });
      polys.forEach((p, i) => {
        tl.to(p, {
          x: 0, y: 0, scale: 1, rotation: 0, opacity: prod.shards[i][2],
          duration: first ? 1.4 : 1.1, ease: 'expo.out'
        }, i * .055);
      });
      return tl;
    }

    function scatterOut() {
      stopFloat();
      // Primero hace desaparecer el logo
      gsap.to(overlay(), { opacity: 0, duration: .2 });
      const tl = gsap.timeline();
      polys.forEach((p, i) => {
        const ang = Math.random() * Math.PI * 2, d = 260 + Math.random() * 130;
        tl.to(p, {
          x: Math.cos(ang) * d, y: Math.sin(ang) * d,
          rotation: Math.random() * 500 - 250, scale: .06, opacity: 0,
          duration: .48, ease: 'power3.in'
        }, i * .022);
      });
      return tl;
    }

    function nav(dir) { if (!locked) goTo(((current + dir) % 3 + 3) % 3); }

    function goTo(ni) {
      if (locked || ni === current) return;
      locked = true;

      const prev = current;
      current = ni;
      const prodIn = PRODUCTS[ni];

      stopFloat();
      gsap.to(overlay(), { opacity: 0, duration: 0.2 });
      setWrapper(ni, true);
      updateUI(ni);

      spawnParticles(PRODUCTS[ni].accent);
      const tl = gsap.timeline({
        onComplete: () => {
          locked = false;
          startFloat();
          overlay().innerHTML = LOGO_HTML[current];
          gsap.fromTo(overlay(), { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' });
        }
      });

      polys.forEach((p, i) => {
        const targetShard = prodIn.shards[i];
        const targetCoords = targetShard[0];
        const targetColor = targetShard[1];
        const targetOpacity = targetShard[2];

        // Efecto "Caos intermedio"
        const ang = Math.random() * Math.PI * 2;
        const d = 120 + Math.random() * 100;

        const polyTl = gsap.timeline();

        // Fase 1: Explosión suave y Morphing simultáneo en vuelo
        polyTl.to(p, {
          x: Math.cos(ang) * d,
          y: Math.sin(ang) * d,
          rotation: Math.random() * 180 - 90,
          scale: 0.6 + Math.random() * 0.4,
          attr: { points: targetCoords },
          fill: targetColor,
          opacity: 0.5 + (targetOpacity * 0.5),
          duration: 0.55,
          ease: 'power2.out'
        }, 0);

        // Fase 2: Ensamblaje en la nueva forma con Expo InOut (tecnológico)
        polyTl.to(p, {
          x: 0,
          y: 0,
          rotation: 0,
          scale: 1,
          opacity: targetOpacity,
          duration: 1.2,
          ease: 'expo.inOut'
        });

        tl.add(polyTl, i * 0.035);
      });
    }

    function updateUI(pi) {
      const p = PRODUCTS[pi];
      const els = ['#prod-name', '#prod-label', '#prod-price'];
      gsap.to(els, {
        opacity: 0, y: -10, duration: .22, onComplete: () => {
          document.getElementById('prod-name').textContent = p.name;
          document.getElementById('prod-label').textContent = p.label;
          document.getElementById('prod-price').innerHTML = `Desde <span>${p.price}</span>`;
          gsap.to(els, { opacity: 1, y: 0, duration: .34 });
        }
      });
      document.documentElement.style.setProperty('--accent', p.accent);
      document.documentElement.style.setProperty('--bg-color', p.bg || '#09090b');
      document.getElementById('glow-bg').style.background =
        `radial-gradient(ellipse 70% 60% at 50% 52%,${p.glow} 0%,transparent 70%)`;
      document.getElementById('product-svg').style.filter =
        `drop-shadow(0 20px 55px ${p.shadow})`;
      document.querySelectorAll('.dot').forEach((d, i) => {
        const a = i === pi;
        d.classList.toggle('active', a);
        d.style.background = a ? p.accent : 'rgba(255,255,255,.2)';
        d.style.boxShadow = a ? `0 0 14px ${p.accent}` : 'none';
      });
    }

    function startFloat() { floatAnim = gsap.to('#product-svg', { y: -11, duration: 2.8, ease: 'sine.inOut', yoyo: true, repeat: -1 }); }
    function stopFloat() { if (floatAnim) { floatAnim.kill(); floatAnim = null; } gsap.to('#product-svg', { y: 0, duration: .3 }); }
    function onMouse(e) {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      const rx = ((e.clientY - cy) / cy) * -9;
      const ry = ((e.clientX - cx) / cx) * 13;

      gsap.to('#svg-wrapper', { rotateX: rx, rotateY: ry, duration: .85, ease: 'power2.out' });

      // Iluminación dinámica persiguiendo al cursor atenuada
      gsap.to('#light-point', {
        x: e.clientX,
        y: e.clientY,
        opacity: 0.15,
        duration: 0.4,
        ease: 'power2.out'
      });

      // Ajustar intensidad de Glassmorphism leve según el movimiento
      const intensity = Math.abs(rx) + Math.abs(ry);
      gsap.to('#glass-overlay', { opacity: 0.1 + (intensity * 0.02), duration: 0.5 });
    }

    // Ocultar luz cuando el cursor abandona la ventana
    document.addEventListener('mouseleave', () => {
      gsap.to('#light-point', { opacity: 0, duration: 0.8 });
    });

    init();
  </script>
</body>

</html>
