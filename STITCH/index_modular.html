<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda APPLE PS5 — Premium Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-color: #09090b; --accent: #ff2a75; }
    body {
      background: var(--bg-color);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 1.5s ease-in-out;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }
    #glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background .9s ease;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      w­idth: 100%;
      height: 100vh;
      gap: clamp(8px, 1.8vh, 20px);
    }
    .product-meta {
      text-align: center;
      min-height: 68px;
      z-index: 100;
    }
    .product-label {
      font-size: clamp(.6rem, 1.4vw, .8rem);
      font-weight: 400;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-bottom: 4px;
    }
    .product-name {
      font-size: clamp(1.4rem, 3.8vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(130deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .svg-wrapper {
      position: relative;
      perspective: 900px;
      cursor: pointer;
      transition: width .5s ease, height .5s ease;
    }
    #product-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      will-change: transform;
      display: block;
    }
    #product-svg polygon {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }
    #logo-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }
    #glass-overlay {
      position: absolute;
      inset: -50px;
      pointer-events: none;
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      mix-blend-mode: soft-light;
      border-radius: 40px;
      opacity: 0;
      z-index: 5;
    }
    #light-point {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle closest-side, rgba(255,255,255,0.15), transparent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      mix-blend-mode: overlay;
      z-index: 6;
      opacity: 0;
    }
    #particles-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      opacity: 0;
      mix-blend-mode: screen;
    }
    .price-tag {
      font-size: clamp(.9rem, 2vw, 1.25rem);
      font-weight: 300;
      color: rgba(255,255,255,.45);
      z-index: 100;
    }
    .price-tag span {
      color: var(--accent);
      font-weight: 700;
    }
    .nav-dots {
      display: flex;
      gap: 14px;
      align-items: center;
      z-index: 100;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      cursor: pointer;
      transition: background .3s, box-shadow .3s, transform .3s;
    }
    .dot.active {
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      transform: scale(1.3);
    }
    .hint {
      font-size: .66rem;
      letter-spacing: .22em;
      color: rgba(255,255,255,.15);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .hint::before, .hint::after {
      content: '';
      width: 22px;
      height: 1px;
      background: rgba(255,255,255,.12);
    }
    .arrow-hint {
      position: fixed;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .22;
      z-index: 100;
    }
    .arrow-hint button {
      background: transparent;
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="glow-bg"></div>
  <div id="light-point"></div>
  <div class="hero">
    <div class="product-meta">
      <p class="product-label" id="prod-label">Smartphone Premium</p>
      <h1 class="product-name" id="prod-name">iPhone 16 Pro</h1>
    </div>
    <div class="svg-wrapper" id="svg-wrapper">
      <svg id="product-svg" viewBox="0 0 400 540" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="logo-overlay"></div>
      <div id="particles-container"></div>
      <div id="glass-overlay"></div>
    </div>
    <p class="price-tag" id="prod-price">Desde <span>$999</span></p>
    <div class="nav-dots">
      <div class="dot" data-i="0"></div>
      <div class="dot active" data-i="1"></div>
    </div>
    <p class="hint">Haz clic para explorar • Flechas para navegar</p>
  </div>
  <div class="arrow-hint">
    <button id="btn-prev">▲</button>
    <button id="btn-next">▼</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
