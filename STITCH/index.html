    :root { --bg-color: #09090b; --accent: #ff2a75; }

      background: var(--bg-color);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 1.5s ease-in-out;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }
    #glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background .9s ease;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      gap: clamp(8px, 1.8vh, 20px);
    }
    .product-meta {
      text-align: center;
      min-height: 68px;
      z-index: 100;
    }
    .product-label {
      font-size: clamp(.6rem, 1.4vw, .8rem);
      font-weight: 400;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-bottom: 4px;
    }
    .product-name {
      font-size: clamp(1.4rem, 3.8vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(130deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .svg-wrapper {
      position: relative;
      perspective: 900px;
      cursor: pointer;
      transition: width .5s ease, height .5s ease;
    }
    #product-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      will-change: transform;
      display: block;
    }
    #product-svg polygon {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }
    #logo-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }
    #glass-overlay {
      position: absolute;
      inset: -50px;
      pointer-events: none;
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      mix-blend-mode: soft-light;
      border-radius: 40px;
      opacity: 0;
      z-index: 5;
    }
    #light-point {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle closest-side, rgba(255,255,255,0.15), transparent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%,-50%);
      mix-blend-mode: overlay;
      z-index: 6;
      opacity: 0;
    }
    #particles-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      opacity: 0;
      mix-blend-mode: screen;
    }
    .price-tag {
      font-size: clamp(.9rem, 2vw, 1.25rem);
      font-weight: 300;
      color: rgba(255,255,255,.45);
      z-index: 100;
    }
    .price-tag span {
      color: var(--accent);
      font-weight: 700;
    }
    .nav-dots {
      display: flex;
      gap: 14px;
      align-items: center;
      z-index: 100;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      cursor: pointer;
      transition: background .3s, box-shadow .3s, transform .3s;
    }
    .dot.active {
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      transform: scale(1.3);
    }
    .hint {
      font-size: .66rem;
      letter-spacing: .22em;
      color: rgba(255,255,255,.15);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .hint::before, .hint::after {
      content: '';
      width: 22px;
      height: 1px;
      background: rgba(255,255,255,.12);
    }
    .arrow-hint {
      position: fixed;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .22;
      z-index: 100;
    }
    .arrow-hint button {
      background: transparent;
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

    function createPolygons() {
      const svg = document.getElementById('product-svg');
      svg.innerHTML = '';
      polys = [];
      for (let i = 0; i < NS; i++) {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        p.id = 'sh' + i;
        svg.appendChild(p);
        polys.push(p);
      }
    }

    function applyShards(pi, state = 'A') {
      const prod = PRODUCTS[pi];
      const shards = state === 'A' ? prod.shardsA : prod.shardsB;
      shards.forEach((s, i) => {
        polys[i].setAttribute('points', s[0]);
        polys[i].setAttribute('fill', s[1]);
        gsap.set(polys[i], { opacity: s[2] });
      });
    }

    function setWrapper(pi, animate = false) {
      const p = PRODUCTS[pi];
      const vh = window.innerHeight, vw = window.innerWidth;
      const maxH = Math.min(p.wh, vh * 0.6), maxW = Math.min(p.ww, vw * 0.82);
      const ratio = p.ww / p.wh;
      let fw = maxW, fh = fw / ratio;
      if (fh > maxH) { fh = maxH; fw = fh * ratio; }
      const el = document.getElementById('svg-wrapper');
      if (animate) {
        gsap.to(el, { width: fw, height: fh, duration: 0.45, ease: 'power2.inOut' });
      } else {
        gsap.set(el, { width: fw, height: fh });
      }
    }

    function buildIn(pi, isFirst = false) {
      const prod = PRODUCTS[pi];
      applyShards(pi, 'A');
      const tl = gsap.timeline({ onComplete: () => startFloat() });
      polys.forEach((p, i) => {
        const shard = prod.shardsA[i];
        tl.to(p, {
          x: 0, y: 0, scale: 1, rotation: 0, opacity: shard[2],
          duration: isFirst ? 1.4 : 1.1, ease: 'expo.out'
        }, i * 0.055);
      });
      return tl;
    }

          scale: 0.7 + Math.random() * 0.3,
          attr: { points: shard[0], fill: shard[1] },
          opacity: 0.6 + shard[2] * 0.4,
          duration: 0.45, ease: 'power2.out'
        }, 0);

        polyTl.to(p, {
          x: 0, y: 0, rotation: 0, scale: 1, opacity: shard[2],
          duration: 0.95, ease: 'expo.inOut'
        });

        tl.add(polyTl, i * 0.035);
      });
      return tl;
    }

    function startFloat() {
      floatAnim = gsap.to(polys, { y: -11, duration: 2.8, ease: 'sine.inOut', yoyo: true, repeat: -1 });
    }

    function stopFloat() {
      if (floatAnim) { floatAnim.kill(); floatAnim = null; }
      gsap.to(polys, { y: 0, duration: 0.3 });
    }

    function updateUI(pi) {
      const p = PRODUCTS[pi];
      const els = ['#prod-name', '#prod-label', '#prod-price'];
      gsap.to(els, {
        opacity: 0, y: -10, duration: 0.22, onComplete: () => {
          document.getElementById('prod-name').textContent = p.name;
          document.getElementById('prod-label').textContent = p.label;
          document.getElementById('prod-price').innerHTML = `Desde <span>${p.price}</span>`;
          gsap.to(els, { opacity: 1, y: 0, duration: 0.34 });
        }
      });

      document.documentElement.style.setProperty('--accent', p.accent);
      document.documentElement.style.setProperty('--bg-color', p.bg);
      document.getElementById('glow-bg').style.background = `radial-gradient(ellipse 70% 60% at 50% 52%, ${p.glow} 0%, transparent 70%)`;
      document.getElementById('product-svg').style.filter = `drop-shadow(0 20px 55px ${p.shadow})`;

      document.querySelectorAll('.dot').forEach((d, i) => {
        const isActive = i === pi;
        d.classList.toggle('active', isActive);
        d.style.background = isActive ? p.accent : 'rgba(255,255,255,.2)';
        d.style.boxShadow = isActive ? `0 0 14px ${p.accent}` : 'none';
      });
    }

    function toggleMorph() {
      if (locked) return;
      locked = true;
      morphState = morphState === 'A' ? 'B' : 'A';
      morphTo(morphState);
      setTimeout(() => locked = false, 1200);
    }

    function navProduct(dir) {
      if (locked) return;
      const newIdx = (current + dir + 6) % 6;
      goToProduct(newIdx);
    }

    function goToProduct(ni) {
      if (locked || ni === current) return;
      locked = true;
      morphState = 'A';
      stopFloat();

      current = ni;
      setWrapper(ni, true);
      updateUI(ni);

      const tl = gsap.timeline({ onComplete: () => { locked = false; buildIn(ni); } });
      const prod = PRODUCTS[ni];

      polys.forEach((p, i) => {
        const shard = prod.shardsA[i];
        const ang = Math.random() * Math.PI * 2, d = 120 + Math.random() * 100;
        const polyTl = gsap.timeline();

        polyTl.to(p, {
          x: Math.cos(ang) * d, y: Math.sin(ang) * d, rotation: Math.random() * 180 - 90,
          scale: 0.6 + Math.random() * 0.4,
          attr: { points: shard[0], fill: shard[1] },
          opacity: 0.5 + shard[2] * 0.5,
          duration: 0.55, ease: 'power2.out'
        }, 0);

        polyTl.to(p, { x: 0, y: 0, rotation: 0, scale: 1, opacity: shard[2], duration: 1.2, ease: 'expo.inOut' });
        tl.add(polyTl, i * 0.035);
      });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // INICIALIZACIÓN
    // ═══════════════════════════════════════════════════════════════════════

    function init() {
      createPolygons();
      applyShards(0, 'A');
      setWrapper(0, false);
      buildIn(0, true);
      updateUI(0);

      document.getElementById('btn-next').addEventListener('click', () => navProduct(1));
      document.getElementById('btn-prev').addEventListener('click', () => navProduct(-1));
      document.querySelectorAll('.dot').forEach(() => document.querySelectorAll('.dot')[1].addEventListener('click', toggleMorph));

      document.addEventListener('mousemove', (e) => {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        const rx = ((e.clientY - cy) / cy) * -9, ry = ((e.clientX - cx) / cx) * 13;
        gsap.to('#svg-wrapper', { rotateX: rx, rotateY: ry, duration: 0.85, ease: 'power2.out' });
        gsap.to('#light-point', { x: e.clientX, y: e.clientY, opacity: 0.15, duration: 0.4, ease: 'power2.out' });
        const intensity = Math.abs(rx) + Math.abs(ry);
        gsap.to('#glass-overlay', { opacity: 0.1 + intensity * 0.02, duration: 0.5 });
      });

      document.addEventListener('mouseleave', () => gsap.to('#light-point', { opacity: 0, duration: 0.8 }));
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navProduct(1);
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navProduct(-1);
      });
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
