<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualización Siluetas Finales HD</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #222; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        img { width: 300px; height: auto; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAAXNSR0IArs4c6QAAACtJREFUGFdjZEAD///PZ2BgYGD4//8/AwMDEwMSYARyGZkgArgyuDI0RSDIAGmCDvWdE8WvAAAAAElFTkSuQmCC'); }
        h3 { margin-bottom: 10px; }
        code { display: block; margin-top: 10px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Siluetas Maestras Finalizadas</h1>
    <p>Calidad HD y Opacidad 100% normalizada</p>
    <div class="grid">
        <div class="card">
            <h3>CYAN</h3>
            <img src="cyan_final.png" alt="Cyan Final">
            <code>cyan_final.png</code>
        </div>
        <div class="card">
            <h3>EMERALD</h3>
            <img src="emerald_final.png" alt="Emerald Final">
            <code>emerald_final.png</code>
        </div>
        <div class="card">
            <h3>PINK</h3>
            <img src="pink_final.png" alt="Pink Final">
            <code>pink_final.png</code>
        </div>
    </div>
</body>
</html>
