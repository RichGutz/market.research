        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-color: #000000;
            --accent-pink: #ff89ab;
            --accent-cyan: #00e3fd;
            --accent-emerald: #b0ff00;
            --current-accent: var(--accent-cyan);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background: var(--bg-color);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- UI HUD --- */
        .hud-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .brand-logo { 
            font-size: 24px; font-weight: 700; letter-spacing: 0.5em; 
            color: var(--current-accent); transition: color 0.8s ease;
            text-shadow: 0 0 20px var(--current-accent);
        }

        /* --- CENTER STAGE --- */
        #stage {
            width: 800px;
            height: 800px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #particle-canvas {
            position: absolute;
            z-index: 5;
            filter: drop-shadow(0 0 30px var(--current-accent));
            transition: filter 1s ease;
        }

        #logo-image {
            position: absolute;
            z-index: 10;
            width: 350px;
            opacity: 1;
            transition: opacity 0.5s ease;
            /* PURE SILHOUETTE ENGINE: High contrast to kill the glow/halo */
            filter: contrast(4) brightness(1.2);
        }

        /* --- NAVIGATION --- */
        .action-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            z-index: 20;
            pointer-events: auto;
        }

        .action-btn {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            text-decoration: none; opacity: 0.3; transition: all 0.5s ease;
        }

        .action-btn.active, .action-btn:hover { opacity: 1; transform: translateY(-5px); }
        .action-btn span { font-size: 11px; letter-spacing: 0.4em; color: #fff; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: #fff; transition: all 0.3s; }
        .action-btn:hover .dot { background: var(--current-accent); box-shadow: 0 0 10px var(--current-accent); transform: scale(2); }

        /* --- CURSOR --- */
        #custom-cursor {
            position: fixed; width: 14px; height: 14px; border: 1px solid var(--current-accent);
            border-radius: 50%; pointer-events: none; z-index: 100; transform: translate(-50%, -50%);
        }

        .system-footer { font-size: 8px; letter-spacing: 0.3em; opacity: 0.2; display: flex; justify-content: space-between; }
    </style>

        ];

        const ACCENTS = ['var(--accent-cyan)', 'var(--accent-pink)', 'var(--accent-emerald)'];

        function initCanvas() {
            canvas.width = 800;
            canvas.height = 800;
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.color = color;
                this.size = Math.random() * 1.5 + 0.5;
                this.vx = (Math.random() - 0.5) * 50;
                this.vy = (Math.random() - 0.5) * 50;
                this.acc = 0.05;
                this.friction = 0.95;
            }

            update(exploding) {
                if (exploding) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                } else {
                    this.x += (this.originX - this.x) * this.acc;
                    this.y += (this.originY - this.y) * this.acc;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function sampleImage(index) {
            const tempImg = new Image();
            tempImg.src = IMG_DATA[index];
            tempImg.onload = () => {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                tempCanvas.width = 400;
                tempCanvas.height = 400;
                tCtx.drawImage(tempImg, 0, 0, 400, 400);

                const pixels = tCtx.getImageData(0, 0, 400, 400).data;
                logoParticles = [];

                for (let y = 0; y < 400; y += 3) {
                    for (let x = 0; x < 400; x += 3) {
                        const i = (y * 400 + x) * 4;
                        const r = pixels[i];
                        const g = pixels[i+1];
                        const b = pixels[i+2];
                        const a = pixels[i+3];

                        // PURE SILHOUETTE SAMPLING: High threshold to eliminate square artifacts/halos
                        if (a > 253 && (r + g + b) > 600) {
                            const color = `rgba(${r}, ${g}, ${b}, ${a/255})`;
                            logoParticles.push(new Particle(x + 200, y + 200, color));
                        }
                    }
                }
            };
        }

        let isExploding = false;

        function transition(index) {
            if (index === currentLogoIndex) return;
            
            isExploding = true;
            logoImg.style.opacity = 0;
            
            document.documentElement.style.setProperty('--current-accent', ACCENTS[index]);
            
            setTimeout(() => {
                currentLogoIndex = index;
                sampleImage(index);
                isExploding = false;
                
                setTimeout(() => {
                    logoImg.src = IMG_DATA[index];
                    logoImg.style.opacity = 1;
                }, 1000);
            }, 800);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            logoParticles.forEach(p => {
                p.update(isExploding);
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function manualTransition(index) {
            clearInterval(autoLoopTimer);
            transition(index);
            startAutoLoop();
        }

        function startAutoLoop() {
            autoLoopTimer = setInterval(() => {
                let next = (currentLogoIndex + 1) % 3;
                transition(next);
            }, 5000);
        }

        // Init
        initCanvas();
        animate();
        transition(0);
        startAutoLoop();

        // Cursor logic
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

    </script>
