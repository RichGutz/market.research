<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLT — Action Tech Ecosystem</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-color: #000000;
            --accent-pink: #fa02ea;
            --accent-cyan: #00e3fd;
            --accent-emerald: #b0ff00;
            --current-accent: var(--accent-cyan);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background: var(--bg-color);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- UI HUD --- */
        .hud-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .brand-logo { 
            font-size: 24px; font-weight: 700; letter-spacing: 0.5em; 
            color: var(--current-accent); transition: color 0.8s ease;
            text-shadow: 0 0 20px var(--current-accent);
        }

        /* --- CENTER STAGE --- */
        #stage {
            width: 800px;
            height: 800px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #particle-canvas {
            position: absolute;
            z-index: 5;
            filter: drop-shadow(0 0 30px var(--current-accent));
            transition: filter 1s ease;
        }

        #logo-image {
            position: absolute;
            z-index: 10;
            width: 350px;
            height: 350px;
            opacity: 1;
            transition: opacity 0.5s ease;
            filter: drop-shadow(0 0 20px var(--current-accent));
            background-color: var(--current-accent);
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        /* --- NAVIGATION --- */
        .action-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            z-index: 20;
            pointer-events: auto;
        }

        .action-btn {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            text-decoration: none; opacity: 0.3; transition: all 0.5s ease;
        }

        .action-btn.active, .action-btn:hover { opacity: 1; transform: translateY(-5px); }
        .action-btn span { font-size: 11px; letter-spacing: 0.4em; color: #fff; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: #fff; transition: all 0.3s; }
        .action-btn:hover .dot { background: var(--current-accent); box-shadow: 0 0 10px var(--current-accent); transform: scale(2); }

        /* --- CURSOR --- */
        #custom-cursor {
            position: fixed; width: 14px; height: 14px; border: 1px solid var(--current-accent);
            border-radius: 50%; pointer-events: none; z-index: 100; transform: translate(-50%, -50%);
        }

        .system-footer { font-size: 8px; letter-spacing: 0.3em; opacity: 0.2; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    
    <div id="stage">
        <canvas id="particle-canvas"></canvas>
        <div id="logo-image"></div>
    </div>

    <div class="hud-overlay">
        <div class="header">
            <div class="brand-logo" id="logo-text">BOLT</div>
            <div style="font-size: 10px; opacity:0.4; letter-spacing:0.2em;">SYSTEM V27.8 // EXTERNAL PNG ARCHITECTURE FINAL</div>
        </div>
        
        <div class="system-footer">
            <div>LCID: 5122-BOLT-LMA</div>
            <div>STATUS: GLOW_LOOP_ACTIVE</div>
            <div>COORD: -12.04, -77.04</div>
        </div>
    </div>

    <nav class="action-container">
        <a href="IPHONE_17_V25.html" class="action-btn" onmouseenter="manualTransition(1)" data-color="pink">
            <div class="dot"></div><span>SPEAK</span>
        </a>
        <a href="AIRPODS_PRO_V25.html" class="action-btn" onmouseenter="manualTransition(0)" data-color="cyan">
            <div class="dot"></div><span>LISTEN</span>
        </a>
        <a href="MACBOOK_REFINED_V25.html" class="action-btn" onmouseenter="manualTransition(2)" data-color="emerald">
            <div class="dot"></div><span>MOVE</span>
        </a>
    </nav>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const logoImg = document.getElementById('logo-image');
        let logoParticles = [];
        let currentLogoIndex = -1;
        let autoLoopTimer = null;

        const IMG_DATA = [
            'runner_cyan.png',
            'runner_pink.png',
            'runner_emerald.png'
        ];

        const LOGO_SILHOUETTE = IMG_DATA[2];
        const ACCENTS = ['#ff89ab', '#00e3fd', '#b0ff00']; // Pink, Cyan, Emerald

        canvas.width = 1000;
        canvas.height = 1000;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = this.x;
                this.destY = this.y;
                this.color = 'rgba(255,255,255,0)';
                this.size = 1.0;
                this.ease = 0.05 + Math.random() * 0.04;
            }
            update() {
                this.x += (this.destX - this.x) * this.ease;
                this.y += (this.destY - this.y) * this.ease;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        async function loadLogoTarget() {
            return new Promise(resolve => {
                const img = new Image();
                img.src = LOGO_SILHOUETTE;
                img.onload = () => {
                    const tempCanvas = document.createElement('canvas');
                    const tCtx = tempCanvas.getContext('2d');
                    const size = 300;
                    tempCanvas.width = size;
                    tempCanvas.height = size;
                    tCtx.drawImage(img, 0, 0, size, size);
                    const data = tCtx.getImageData(0, 0, size, size).data;
                    const targets = [];
                    for (let y = 0; y < size; y += 4) {
                        for (let x = 0; x < size; x += 4) {
                            const i = (y * size + x) * 4;
                            if (data[i + 3] > 100) {
                                targets.push({
                                    x: x + (canvas.width - size)/2, 
                                    y: y + (canvas.height - size)/2
                                });
                            }
                        }
                    }
                    resolve(targets);
                };
            });
        }

        async function init() {
            for (let i = 0; i < 4000; i++) {
                logoParticles.push(new Particle());
            }
            transitionTo(0);
            animate();
            startAutoLoop();
        }

        function startAutoLoop() {
            if (autoLoopTimer) clearInterval(autoLoopTimer);
            autoLoopTimer = setInterval(() => {
                let next = (currentLogoIndex + 1) % IMG_DATA.length;
                transitionTo(next);
            }, 5000);
        }

        function manualTransition(index) {
            startAutoLoop();
            transitionTo(index);
        }

        async function transitionTo(index) {
            if (currentLogoIndex === index) return;
            currentLogoIndex = index;
            
            logoImg.style.opacity = 0;
            
            const targets = await loadLogoTarget();
            const activeColor = ACCENTS[index];
            document.documentElement.style.setProperty('--current-accent', activeColor);
            
            // Dust explosion
            logoParticles.forEach(p => {
                p.destX = p.x + (Math.random() - 0.5) * 800;
                p.destY = p.y + (Math.random() - 0.5) * 800;
            });

            setTimeout(() => {
                logoParticles.forEach((p, i) => {
                    if (i < targets.length) {
                        p.destX = targets[i].x;
                        p.destY = targets[i].y;
                        p.color = activeColor;
                    } else {
                        p.destX = Math.random() > 0.5 ? -200 : canvas.width + 200;
                        p.destY = Math.random() * canvas.height;
                    }
                });
                
                setTimeout(() => {
                    logoImg.style.maskImage = `url(${LOGO_SILHOUETTE})`;
                    logoImg.style.webkitMaskImage = `url(${LOGO_SILHOUETTE})`;
                    logoImg.style.opacity = 1;
                }, 800);
            }, 400);
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            logoParticles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        init();
    </script>
</body>
</html>
