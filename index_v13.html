<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Premium Electronics V13</title>
   <link rel="preconnect" href="https://fonts.googleapis.com" />
   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-color: #050508;
      --accent: #ff2a75;
      --glow: rgba(255, 42, 117, 0.4);
      --glass: rgba(255, 255, 255, 0.03);
    }

    body {
      background: radial-gradient(circle at 50% 50%, #0f0f1a 0%, #050508 100%);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 1.5s ease-in-out;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
      background-size: 40px 40px;
      pointer-events: none;
      opacity: 0.5;
    }

    #glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background .9s ease;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      gap: clamp(8px, 1.8vh, 20px);
    }

    .product-meta {
      text-align: center;
      min-height: 68px;
    }

    .product-label {
      font-size: clamp(.6rem, 1.4vw, .8rem);
      font-weight: 400;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      margin-bottom: 4px;
    }

    .product-name {
      font-size: clamp(1.4rem, 3.8vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(130deg, #fff 30%, var(--accent, #4fc3f7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Wrapper: position:relative es clave para el overlay de logos */
    .svg-wrapper {
      position: relative;
      perspective: 900px;
      cursor: pointer;
      transition: width .5s ease, height .5s ease;
    }

    #product-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      will-change: transform;
      display: block;
    }

    #product-svg polygon {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* Overlay de logos: se superpone sobre el SVG */
    #logo-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      /* los logos hijos usarán position:absolute dentro de este div */
    }

    .price-tag {
      font-size: clamp(.9rem, 2vw, 1.25rem);
      font-weight: 300;
      color: rgba(255, 255, 255, .45);
    }

    .price-tag span {
      color: var(--accent, #4fc3f7);
      font-weight: 700;
    }

    .nav-dots {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .2);
      cursor: pointer;
      transition: background .3s, box-shadow .3s, transform .3s;
    }

    .dot.active {
      background: var(--accent, #4fc3f7);
      box-shadow: 0 0 12px var(--accent, #4fc3f7);
      transform: scale(1.3);
    }

    .hint {
      font-size: .66rem;
      letter-spacing: .22em;
      color: rgba(255, 255, 255, .15);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hint::before,
    .hint::after {
      content: '';
      width: 22px;
      height: 1px;
      background: rgba(255, 255, 255, .12);
    }

    .arrow-hint {
      position: fixed;
      right: 26px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .22;
    }

    .arrow-hint button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .3);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── GLASSMORPHISM & LIGHTING ─── */
    #glass-overlay {
      position: absolute;
      inset: -50px;
      pointer-events: none;
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      mix-blend-mode: soft-light;
      border-radius: 40px;
      opacity: 0;
      transition: opacity 1s;
      z-index: 5;
    }

    #light-point {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle closest-side, rgba(255, 255, 255, 0.15), transparent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      mix-blend-mode: overlay;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.5s;
    }


    #particles-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      mix-blend-mode: screen;
    }

    /* ─── ONLINE STORE VIEW (TU TIENDA) ─── */
    #store-view {
      position: absolute;
      inset: 0;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      padding: clamp(15px, 3vw, 40px);
      background: rgba(5, 5, 10, 0.85);
      backdrop-filter: blur(35px) saturate(120%);
      -webkit-backdrop-filter: blur(35px) saturate(120%);
      overflow-y: auto;
    }

    .store-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 1600px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-5px);
    }

    .store-title {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Hero Unit Layout */
    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      animation: heroIn 1s ease forwards;
    }

    @media (min-width: 900px) {
      .hero-container {
        flex-direction: row;
        justify-content: space-between;
        padding: 0 40px;
      }
    }

    @keyframes heroIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .hero-image-pane {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-height: 55vh;
      margin-bottom: 30px;
    }

    @media (min-width: 900px) {
      .hero-image-pane {
        max-height: 65vh;
        /* Se redujo el limite vertical para que no sea tan gigante */
        margin-bottom: 0;
        justify-content: flex-end;
        /* Apegado al centro */
        padding-right: 5%;
      }
    }

    .hero-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      /* Magia para fotos scrapeadas con fondo blanco (JPEG):
           mix-blend-mode multiply esconde lo blanco si el fondo detrás es oscuro, pero como nuestro glassmorphism es muy oscuro,
           usaremos un truco visual para recortar brillo excesivo. 
           Si la foto es PNG transparente lucirá perfecta. */
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.1)) contrast(1.1);
      animation: floatImg 6s ease-in-out infinite;
    }

    @keyframes floatImg {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .hero-info-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
      text-align: center;
    }

    @media (min-width: 900px) {
      .hero-info-pane {
        text-align: left;
        max-width: 500px;
      }
    }

    .hero-brand {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 15px;
      font-weight: 700;
    }

    .hero-name {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin-bottom: 25px;
      background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-desc {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .hero-price-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    @media (min-width: 900px) {
      .hero-price-section {
        flex-direction: row;
        align-items: center;
        gap: 30px;
      }
    }

    .hero-price {
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
    }

    .btn-buy {
      background: var(--accent);
      color: #000;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px 40px;
      border-radius: 40px;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .btn-buy:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 30px var(--glow);
    }

    /* Re-Ajustes JS / CSS de emergencias */
    .hero-img-fallback-wrapper {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      mix-blend-mode: normal;
    }
  </style>
</head>

        accent: '#e2f1fc', glow: 'rgba(59,130,246,0.5)', shadow: 'rgba(59,130,246,0.8)',
        bg: '#030c1f',
        vb: '0 0 400 540', ww: 230, wh: 420,
        shards: [
          ['130,12 200,12 210,42 110,42', 'rgba(220,240,255,0.9)', 1],
          ['200,12 270,12 290,42 210,42', 'rgba(200,230,255,0.85)', 1],
          ['175,14 100,30 95,140 174,130', 'rgba(250,250,255,0.95)', 1],
          ['95,140 22,48 16,270 90,264', 'rgba(240,240,250,0.9)', 1],
          ['14,272 90,266 84,360 10,368', 'rgba(230,235,245,0.95)', 1],
          ['84,360 170,258 164,464 80,470', 'rgba(215,225,235,0.9)', 1],
          ['225,14 300,30 305,140 226,130', 'rgba(245,250,255,0.95)', 1],
          ['305,140 378,48 384,270 310,264', 'rgba(230,240,250,0.9)', 1],
          ['310,266 386,272 390,368 316,360', 'rgba(215,225,240,0.95)', 1],
          ['316,360 230,258 236,464 320,470', 'rgba(200,215,230,0.9)', 1],
          ['178,10 200,10 202,80 175,80', 'rgba(10,15,30,0.95)', 1],
          ['200,10 222,10 225,80 202,80', 'rgba(15,20,40,0.9)', 1],
          ['172,80 200,80 202,256 168,256', 'rgba(20,25,45,0.95)', 1],
          ['200,80 228,80 232,256 202,256', 'rgba(25,30,50,0.9)', 1],
          ['166,258 200,258 202,464 162,464', 'rgba(15,20,35,0.95)', 1],
          ['200,258 234,258 238,464 202,464', 'rgba(20,25,40,0.9)', 1],
          ['172,14 175,14 174,130 171,130', 'rgba(50,150,255,1)', 1],
          ['171,132 174,132 168,256 165,256', 'rgba(40,140,255,1)', 1],
          ['225,14 228,14 229,130 226,130', 'rgba(60,160,255,1)', 1],
          ['226,132 229,132 235,256 232,256', 'rgba(50,150,255,1)', 1],
          ['158,464 175,463 172,490 155,490', '#181818', 1],
          ['175,463 200,462 197,528 172,490', '#151515', 1],
          ['200,462 225,463 228,490 203,528', '#1a1a1a', 1],
          ['225,463 242,464 245,490 228,490', '#1c1c1c', 1],
          ['320,380 390,380 380,480 310,480', 'rgba(150,180,210,0.7)', 1],
          ['390,380 405,385 395,485 380,480', 'rgba(130,160,190,0.8)', 1],
          ['395,420 402,420 400,460 393,460', 'rgba(0,20,50,0.8)', 1],
          ['170,300 180,300 180,305 170,305', 'rgba(50,150,255,0.6)', 1],
          ['170,315 178,315 178,320 170,320', 'rgba(50,150,255,0.6)', 1],
          ['210,400 220,400 220,405 210,405', 'rgba(100,180,255,0.7)', 1]
        ]
      }
    ];

    /* ═══════════════════════════════════════════════════════
       MOTOR
       ═══════════════════════════════════════════════════════ */
    let current = 0, locked = false, floatAnim = null;
    const NS = 30, polys = [];
    const overlay = () => document.getElementById('logo-overlay');


    function spawnParticles(color) {
      const container = document.getElementById('particles-container');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = color;
        p.style.boxShadow = `0 0 10px ${color}`;

        // Random shapes
        if (Math.random() > 0.5) p.style.borderRadius = '0%';
        container.appendChild(p);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 80 + Math.random() * 300;

        gsap.to(p, {
          x: Math.cos(angle) * velocity,
          y: Math.sin(angle) * velocity,
          rotation: Math.random() * 360,
          scale: Math.random() * 3,
          opacity: 0.8,
          duration: 0.2 + Math.random() * 0.4,
          ease: 'power3.out',
          onComplete: () => {
            gsap.to(p, {
              opacity: 0,
              scale: 0,
              y: "+=50",
              duration: 0.6 + Math.random() * 1.2,
              ease: 'power2.in',
              onComplete: () => p.remove()
            });
          }
        });
      }
    }

    function init() {

      const svg = document.getElementById('product-svg');
      for (let i = 0; i < NS; i++) {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        p.id = 'sh' + i; svg.appendChild(p); polys.push(p);
      }
      applyShards(0); setWrapper(0, false); scatter(); buildIn(true);

      document.getElementById('svg-wrapper').addEventListener('click', openStore);
      document.getElementById('btn-next').addEventListener('click', () => nav(1));
      document.getElementById('btn-prev').addEventListener('click', () => nav(-1));
      document.querySelectorAll('.dot').forEach(d => {
        d.addEventListener('click', () => { const i = +d.dataset.i; if (i !== current && !locked) goTo(i); });
      });
      document.addEventListener('mousemove', onMouse);
      document.addEventListener('keydown', handleKeydown);
      setInterval(() => { if (current === 2 && !locked) gsap.to([polys[8], polys[9]], { opacity: .3, duration: .6, ease: 'sine.inOut', yoyo: true, repeat: 1 }); }, 2400);
    }

    function setWrapper(pi, animate = false) {
      const p = PRODUCTS[pi];
      const vh = window.innerHeight, vw = window.innerWidth;
      const maxH = Math.min(p.wh, vh * .60), maxW = Math.min(p.ww, vw * .82);
      const ratio = p.ww / p.wh;
      let fw = maxW, fh = fw / ratio;
      if (fh > maxH) { fh = maxH; fw = fh * ratio; }
      const el = document.getElementById('svg-wrapper');
      document.getElementById('product-svg').setAttribute('viewBox', p.vb);
      animate ? gsap.to(el, { width: fw, height: fh, duration: .45, ease: 'power2.inOut' })
        : gsap.set(el, { width: fw, height: fh });
    }

    function applyShards(pi) {
      PRODUCTS[pi].shards.forEach((s, i) => {
        polys[i].setAttribute('points', s[0]);
        polys[i].setAttribute('fill', s[1]);
        gsap.set(polys[i], { opacity: s[2] });
      });
    }

    function scatter() {
      polys.forEach((p, i) => {
        const ang = (i / NS) * Math.PI * 2 + Math.random() * .8;
        const d = 350 + Math.random() * 180;
        gsap.set(p, { x: Math.cos(ang) * d, y: Math.sin(ang) * d, rotation: Math.random() * 360 - 180, scale: 0, opacity: 0 });
      });
    }

    function buildIn(first = false) {
      const prod = PRODUCTS[current];
      const tl = gsap.timeline({
        onComplete: () => {
          locked = false; startFloat();
          // Fade in del logo al terminar el ensamblaje
          overlay().innerHTML = LOGO_HTML[current];
          gsap.fromTo(overlay(), { opacity: 0 }, { opacity: 1, duration: .8, ease: 'power2.out' });
        }
      });
      polys.forEach((p, i) => {
        tl.to(p, {
          x: 0, y: 0, scale: 1, rotation: 0, opacity: prod.shards[i][2],
          duration: first ? 1.4 : 1.1, ease: 'expo.out'
        }, i * .055);
      });
      return tl;
    }

    function scatterOut() {
      stopFloat();
      // Primero hace desaparecer el logo
      gsap.to(overlay(), { opacity: 0, duration: .2 });
      const tl = gsap.timeline();
      polys.forEach((p, i) => {
        const ang = Math.random() * Math.PI * 2, d = 260 + Math.random() * 130;
        tl.to(p, {
          x: Math.cos(ang) * d, y: Math.sin(ang) * d,
          rotation: Math.random() * 500 - 250, scale: .06, opacity: 0,
          duration: .48, ease: 'power3.in'
        }, i * .022);
      });
      return tl;
    }

    function nav(dir) { if (!locked) goTo(((current + dir) % 3 + 3) % 3); }

    function goTo(ni) {
      if (locked || ni === current) return;
      locked = true;

      const prev = current;
      current = ni;
      const prodIn = PRODUCTS[ni];

      stopFloat();
      gsap.to(overlay(), { opacity: 0, duration: 0.2 });
      setWrapper(ni, true);
      updateUI(ni);

      spawnParticles(PRODUCTS[ni].accent);
      const tl = gsap.timeline({
        onComplete: () => {
          locked = false;
          startFloat();
          overlay().innerHTML = LOGO_HTML[current];
          gsap.fromTo(overlay(), { opacity: 0 }, { opacity: 1, duration: 0.8, ease: 'power2.out' });
        }
      });

      polys.forEach((p, i) => {
        const targetShard = prodIn.shards[i];
        const targetCoords = targetShard[0];
        const targetColor = targetShard[1];
        const targetOpacity = targetShard[2];

        // Efecto "Caos intermedio"
        const ang = Math.random() * Math.PI * 2;
        const d = 120 + Math.random() * 100;

        const polyTl = gsap.timeline();

        // Fase 1: Explosión suave y Morphing simultáneo en vuelo
        polyTl.to(p, {
          x: Math.cos(ang) * d,
          y: Math.sin(ang) * d,
          rotation: Math.random() * 180 - 90,
          scale: 0.6 + Math.random() * 0.4,
          attr: { points: targetCoords },
          fill: targetColor,
          opacity: 0.5 + (targetOpacity * 0.5),
          duration: 0.55,
          ease: 'power2.out'
        }, 0);

        // Fase 2: Ensamblaje en la nueva forma con Expo InOut (tecnológico)
        polyTl.to(p, {
          x: 0,
          y: 0,
          rotation: 0,
          scale: 1,
          opacity: targetOpacity,
          duration: 1.2,
          ease: 'expo.inOut'
        });

        tl.add(polyTl, i * 0.035);
      });
    }


    // API Configuration
    const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
      ? "http://127.0.0.1:8000"
      : "/api";

    let storeOpen = false;

    function openStore() {
      if (locked || storeOpen) return;
      locked = true;
      storeOpen = true;

      const p = PRODUCTS[current];

      // Detener flotacion
      stopFloat();
      // Desactivar interacciones flechas y puntos
      document.removeEventListener('keydown', handleKeydown);

      // Explosion expansiva de los shards (Species in Pieces)
      const tl = gsap.timeline({
        onComplete: () => {
          locked = false;
        }
      });

      // Ocultar Interfaz 3D Hero
      gsap.to(['.product-meta', '.price-tag', '.nav-dots', '.hint', '.arrow-hint', '#light-point', '#logo-overlay'], {
        opacity: 0, duration: 0.4, ease: 'power2.inOut', pointerEvents: 'none'
      });

      // Esparce poligonos por fuera de la pantalla violentamente
      polys.forEach((poly, i) => {
        const ang = Math.random() * Math.PI * 2;
        const d = 800 + Math.random() * 600; // Muy lejos out-of-bounds
        tl.to(poly, {
          x: Math.cos(ang) * d,
          y: Math.sin(ang) * d,
          rotation: Math.random() * 800 - 400,
          scale: 0.2,
          opacity: 0,
          duration: 0.8,
          ease: 'power4.in'
        }, i * .015);
      });

      // Fade in de la tienda
      gsap.to('#store-view', {
        opacity: 1, duration: 0.8, delay: 0.6, pointerEvents: 'auto'
      });

      fetchStoreData(p);
    }

    function closeStore() {
      if (locked) return;
      locked = true;
      storeOpen = false;

      // Ocultar Tienda
      gsap.to('#store-view', {
        opacity: 0, duration: 0.4, pointerEvents: 'none'
      });

      // Re-ensamblar figura
      buildIn(false);

      // Mostrar Interfaz 3D Hero
      gsap.to(['.product-meta', '.price-tag', '.nav-dots', '.hint', '.arrow-hint', '#logo-overlay'], {
        opacity: 1, duration: 0.8, delay: 0.8, ease: 'power2.out', pointerEvents: 'auto'
      });

      document.addEventListener('keydown', handleKeydown);
    }

    async function fetchStoreData(productObj) {
      // Configuramos el nombre de tu marca arriba
      document.getElementById('store-title').textContent = "Tu Tienda Oficial";

      const grid = document.getElementById('store-grid');
      // Limpiamos contenido
      grid.innerHTML = '<div class="store-loader"><span class="spinner-inline"></span> Cargando fotografía en alta resolución...</div>';

      try {
        const res = await fetch(`${API_URL}/market-prices`);
        if (!res.ok) throw new Error("Error fetching data");
        const allPrices = await res.json();

        let fCat = productObj.name.split(' ')[0];
        if (fCat === 'MacBook') fCat = 'Macbook';
        if (fCat === 'PlayStation') fCat = 'PlayStation';

        // Filtramos para ubicar SOLO imágenes válidas (para encontrar la mejor foto scraping)
        let filtered = allPrices.filter(p => {
          let esCategoria = (fCat === 'PlayStation') ? (p.category === 'PlayStation' || p.category === 'PS5') : (p.category === fCat);
          return esCategoria && p.image_url && p.image_url.startsWith('http') && !p.image_url.includes('placeholder');
        });

        let mainImgSrc = 'https://placehold.co/800x800/222/555?text=Modelo+Exclusivo';
        let imgNeedsWhiteBg = false;

        if (filtered.length > 0) {
          // Priorizar Ripley (suele ser PNG sin fondo real) o Hiraoka
          let topChoice = filtered.find(v => (v.store === 'Ripley' || v.store === 'Hiraoka') && !v.image_url.includes('svg'));
          if (topChoice) {
            mainImgSrc = topChoice.image_url;
          } else {
            mainImgSrc = filtered[0].image_url;
          }

          // Si es iShop (que siempre usa fondos JPEG blancos sólidos horribles) le pondremos un parche
          if (mainImgSrc.includes('tiendasishop') || mainImgSrc.includes('shopify')) {
            imgNeedsWhiteBg = true;
          }
        }

        // Dummys de Precio de TU negocio (Basado en el producto seleccionado)
        let displayPrice = productObj.price; // Ej. $999 (El target_usa_price seteado en PRODUCTS)
        let desc = "Experimenta el máximo nivel de tecnología e innovación directamente en tus manos. Importación directa, sellado de fábrica.";

        // Inyectar Layout Tipo "Apple Hero"
        grid.innerHTML = `
          <div class="hero-container">
            <div class="hero-image-pane">
               <div class="${imgNeedsWhiteBg ? 'hero-img-fallback-wrapper' : ''}" style="height:100%; display:flex; align-items:center; justify-content:center;">
                 <img src="${mainImgSrc}" alt="${productObj.name}" class="hero-img" crossorigin="anonymous" style="${imgNeedsWhiteBg ? 'mix-blend-mode: normal; filter: none;' : ''}">
               </div>
            </div>
            
            <div class="hero-info-pane">
               <div class="hero-brand">Exclusivo</div>
               <div class="hero-name">${productObj.name}</div>
               <div class="hero-desc">${desc}</div>
               
               <div class="hero-price-section">
                 <div class="hero-price">${displayPrice}</div>
                 <a href="https://wa.me/51999999999?text=Hola,%20quiero%20reservar%20el%20${encodeURIComponent(productObj.name)}.%20Precio:%20${encodeURIComponent(displayPrice)}" target="_blank" class="btn-buy">Reservar Ahora</a>
               </div>
            </div>
          </div>
        `;

        // Pequeño workaround para que el accent color del botón coincida dinámicamente con la consola activa
        setTimeout(() => {
          const btnBuy = document.querySelector('.btn-buy');
          if (btnBuy) {
            btnBuy.style.background = productObj.accent;
            btnBuy.style.boxShadow = `0 15px 30px ${productObj.glow}`;
          }
          const heroBrand = document.querySelector('.hero-brand');
          if (heroBrand) heroBrand.style.color = productObj.accent;
        }, 50);

      } catch (err) {
        console.error(err);
        grid.innerHTML = '<div class="store-loader">⚠️ Error de conexión con tu inventario.</div>';
      }
    }

    function handleKeydown(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nav(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') nav(-1);
    }

    function updateUI(pi) {
      const p = PRODUCTS[pi];
      const els = ['#prod-name', '#prod-label', '#prod-price'];
      gsap.to(els, {
        opacity: 0, y: -10, duration: .22, onComplete: () => {
          document.getElementById('prod-name').textContent = p.name;
          document.getElementById('prod-label').textContent = p.label;
          document.getElementById('prod-price').innerHTML = `Desde <span>${p.price}</span>`;
          gsap.to(els, { opacity: 1, y: 0, duration: .34 });
        }
      });
      document.documentElement.style.setProperty('--accent', p.accent);
      document.documentElement.style.setProperty('--bg-color', p.bg || '#09090b');
      document.getElementById('glow-bg').style.background =
        `radial-gradient(ellipse 70% 60% at 50% 52%,${p.glow} 0%,transparent 70%)`;
      document.getElementById('product-svg').style.filter =
        `drop-shadow(0 20px 55px ${p.shadow})`;
      document.querySelectorAll('.dot').forEach((d, i) => {
        const a = i === pi;
        d.classList.toggle('active', a);
        d.style.background = a ? p.accent : 'rgba(255,255,255,.2)';
        d.style.boxShadow = a ? `0 0 14px ${p.accent}` : 'none';
      });
    }

    function startFloat() { floatAnim = gsap.to('#product-svg', { y: -11, duration: 2.8, ease: 'sine.inOut', yoyo: true, repeat: -1 }); }
    function stopFloat() { if (floatAnim) { floatAnim.kill(); floatAnim = null; } gsap.to('#product-svg', { y: 0, duration: .3 }); }
    function onMouse(e) {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      const rx = ((e.clientY - cy) / cy) * -9;
      const ry = ((e.clientX - cx) / cx) * 13;

      gsap.to('#svg-wrapper', { rotateX: rx, rotateY: ry, duration: .85, ease: 'power2.out' });

      // Iluminación dinámica persiguiendo al cursor atenuada
      gsap.to('#light-point', {
        x: e.clientX,
        y: e.clientY,
        opacity: 0.15,
        duration: 0.4,
        ease: 'power2.out'
      });

      // Ajustar intensidad de Glassmorphism leve según el movimiento
      const intensity = Math.abs(rx) + Math.abs(ry);
      gsap.to('#glass-overlay', { opacity: 0.1 + (intensity * 0.02), duration: 0.5 });
    }

    // Ocultar luz cuando el cursor abandona la ventana
    document.addEventListener('mouseleave', () => {
      gsap.to('#light-point', { opacity: 0, duration: 0.8 });
    });

    init();
  </script>
